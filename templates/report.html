<!DOCTYPE html>
<html>
<head>
    <title>Athena Report</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f7fb;
            margin: 40px;
        }

        h1 {
            color: #1f4e79;
        }

        .report-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 10px rgba(0, 0, 0, .1);
        }

        pre {
            white-space: pre-wrap;
            line-height: 1.45;
            font-size: 14px;
        }

        a {
            text-decoration: none;
            color: #1565c0;
            font-weight: bold;
        }

        .top-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .print-button {
            border: none;
            border-radius: 8px;
            background: #1f4e79;
            color: white;
            padding: 10px 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .print-button:hover {
            background: #2d6aa3;
        }

        @media print {
            body {
                background: white;
                margin: 20px;
            }

            .top-actions {
                display: none;
            }

            .report-card {
                box-shadow: none;
                border-radius: 0;
                padding: 0;
            }

            h1 {
                color: black;
            }
        }
    </style>
</head>
<body>

<div class="top-actions">
    <a href="/dashboard">← Back to Dashboard</a>
    <button class="print-button" onclick="window.print()">Print / Save as PDF</button>
</div>

<h1>📋 Athena Call Report</h1>
<p>{{ report_name }}</p>

<div class="report-card">
    <pre>{{ report_content }}</pre>
</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Athena Dashboard</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f7fb;
            margin: 40px;
        }

        h1 {
            color: #1f4e79;
        }

        .nav {
            margin: 20px 0 25px;
        }

        .nav a {
            display: inline-block;
            margin-right: 18px;
            padding: 10px 18px;
            background: #1f4e79;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background 0.2s;
        }

        .nav a:hover {
            background: #2d6aa3;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 22px;
            margin-bottom: 20px;
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
        }

        .scenario {
            font-size: 22px;
            font-weight: bold;
        }

        .meta {
            color: #555;
            margin: 8px 0;
        }

        .badge {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 20px;
            background: #e8f5e9;
            color: #1b5e20;
            font-weight: bold;
            margin-right: 10px;
        }

        a {
            text-decoration: none;
            color: #1565c0;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>🏥 Athena Dashboard</h1>
<div class="nav">
    <a href="/analytics">📊 Analytics</a>
</div>
<p>Recent Call Reports</p>

{% for report in reports %}
<div class="card">
    <div class="scenario">📞 {{ report.scenario }}</div>

    <p class="meta">🕒 {{ report.date }}</p>

    <span class="badge">{{ report.status }}</span>
    <span class="badge">Quality: {{ report.quality }}</span>
    <span class="badge">Duration: {{ report.duration }}</span>

    <p>
        <a href="/report/{{ report.filename }}">View Full Report</a>
    </p>
</div>
{% endfor %}

</body>
</html>
